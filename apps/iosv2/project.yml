name: Linkfit2
options:
  bundleIdPrefix: az.linkfit
  deploymentTarget:
    iOS: "18.0"
  developmentLanguage: en
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: YES

packages:
  LinkfitPackage:
    path: LinkfitPackage
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "7.1.0"

targets:
  Linkfit2:
    type: application
    platform: iOS
    sources:
      - path: App
    configFiles:
      Debug: App/Config/Debug.xcconfig
      Release: App/Config/Release.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: az.linkfit.v2
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/Linkfit2.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: LinkfitPackage
        product: AppCore
      - package: LinkfitPackage
        product: Models
      - package: LinkfitPackage
        product: Networking
      - package: LinkfitPackage
        product: Persistence
      - package: LinkfitPackage
        product: DesignSystem
      - package: LinkfitPackage
        product: FeatureAuth
      - package: LinkfitPackage
        product: FeatureHome
      - package: LinkfitPackage
        product: FeatureGames
      - package: LinkfitPackage
        product: FeatureVenues
      - package: LinkfitPackage
        product: FeatureProfile
      - package: LinkfitPackage
        product: FeatureChat
