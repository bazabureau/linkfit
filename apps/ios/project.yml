name: Linkfit
options:
  bundleIdPrefix: az.linkfit
  deploymentTarget:
    iOS: "18.0"
  groupSortPosition: top
  generateEmptyDirectories: true
  developmentLanguage: az

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    GCC_TREAT_WARNINGS_AS_ERRORS: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CLANG_ENABLE_MODULE_DEBUGGING: NO
    GENERATE_INFOPLIST_FILE: YES
    # Version for App Store submission. Bump CURRENT_PROJECT_VERSION on
    # every new TestFlight build; bump MARKETING_VERSION for user-visible
    # releases (App Store).
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "16"
    # Crash reporting — Sentry DSN, substituted into Info.plist at build time
    # via the `$(SENTRY_DSN)` Info.plist value (see `Linkfit/Info.plist` keys
    # below). Defaults to empty so dev/CI builds skip Sentry init. Override
    # by exporting `SENTRY_DSN=...` in the shell that invokes `xcodebuild`,
    # or by setting it in CI secrets.
    SENTRY_DSN: ""
    # Product analytics — PostHog project key + host. Empty defaults mean
    # `Analytics.start(...)` no-ops in dev/CI builds. Override the key via
    # `POSTHOG_API_KEY=...` in CI secrets or the shell driving `xcodebuild`;
    # the host can be left at the SDK's `https://app.posthog.com` default
    # for PostHog Cloud or pointed at a self-hosted instance.
    POSTHOG_API_KEY: ""
    POSTHOG_HOST: "https://app.posthog.com"

packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "7.1.0"
  # Crash + error reporting. Linked into the host app; the widget and
  # LiveActivity extensions intentionally don't import Sentry to keep their
  # binary size and launch-time minimal. The `CrashReporter` facade in
  # `Core/Crash/CrashReporter.swift` guards every call with `canImport(Sentry)`
  # so the file still compiles even if the package is yanked.
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa.git
    from: "8.0.0"
  # Product analytics — PostHog iOS SDK. Linked into the host app only;
  # the widget and LiveActivity extensions don't ship analytics. The
  # `Analytics` facade in `Core/Analytics/Analytics.swift` guards every
  # call with `canImport(PostHog)` so the file still compiles even when
  # the package is yanked. A nil/empty `POSTHOG_API_KEY` makes
  # `Analytics.start(...)` a no-op so dev/CI builds boot cleanly without
  # a configured PostHog project.
  PostHog:
    url: https://github.com/PostHog/posthog-ios.git
    from: "3.0.0"

targets:
  Linkfit:
    type: application
    entitlements:
      path: Linkfit/Linkfit.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        # Widget agent — App Group shared with the LinkfitWidgets extension
        # so the widget can read the user's next game / streak from the same
        # UserDefaults suite the app writes via `WidgetCache`.
        com.apple.security.application-groups:
          - group.az.linkfit.app
        # Universal Links — claims `https://linkfit.az/...` URLs for the
        # app. Paired with the AASA file at
        # `apps/web/public/.well-known/apple-app-site-association`. Apple
        # validates the host against this entitlement before opening the
        # app; the AASA's `paths` array narrows to the prefixes we
        # actually handle in `DeepLink.from(url:)`.
        # linkfit.az now serves over HTTPS (Cloudflare, valid cert). Ensure
        # /.well-known/apple-app-site-association returns the AASA JSON with
        # `Content-Type: application/json` so Universal Links resolve on device.
        com.apple.developer.associated-domains:
          - applinks:linkfit.az
        aps-environment: production
    dependencies:
      - package: GoogleSignIn
        product: GoogleSignIn
      # Crash + error reporting — see `Core/Crash/CrashReporter.swift`. A nil
      # or empty `SENTRY_DSN` makes `CrashReporter.start(...)` a no-op so
      # dev/CI builds without a configured Sentry project still boot cleanly.
      - package: Sentry
        product: Sentry
      # Product analytics — see `Core/Analytics/Analytics.swift`. A nil or
      # empty `POSTHOG_API_KEY` makes `Analytics.start(...)` a no-op so
      # dev/CI builds without a configured PostHog project still boot
      # cleanly. The facade also `canImport(PostHog)`-guards every call so
      # the file compiles even when the package is yanked.
      - package: PostHog
        product: PostHog
      # Widget agent — embed the WidgetKit extension inside the host app
      # bundle. xcodegen wires the Copy Files (PlugIns) build phase for us.
      - target: LinkfitWidgets
        embed: true
      # LiveActivity agent — embed the ActivityKit widget extension that
      # renders the Dynamic Island / lock-screen match banner.
      - target: LinkfitLiveActivity
        embed: true
    info:
      path: Linkfit/Info.plist
      properties:
        CFBundleDisplayName: Linkfit
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UIUserInterfaceStyle: Light
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen:
          UIColorName: BrandBackground
        UISupportedInterfaceOrientations~iphone:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSLocationWhenInUseUsageDescription: "Linkfit uses your location to find games and venues near you."
        NSPhotoLibraryAddUsageDescription: "Linkfit needs permission to save images you receive in chats to your photo library."
        NSPhotoLibraryUsageDescription: "Linkfit needs access to your photos so you can attach them to messages."
        NSMicrophoneUsageDescription: "Linkfit needs access to your microphone to record voice messages."
        # Stories agent (Wave-12) — camera-first story creator records
        # photos via AVCaptureSession. Required for the camera viewfinder
        # to bypass the immediate `denied` state on first launch.
        NSCameraUsageDescription: "Linkfit needs access to your camera so you can capture stories and share them with the community."
        # LiveActivity agent — enables ActivityKit so the app can drive
        # the Dynamic Island banner during an in-progress match. Without
        # this flag, `Activity.request(...)` is rejected on every device.
        NSSupportsLiveActivities: true
        NSSupportsLiveActivitiesFrequentUpdates: true
        # Export compliance — the app uses only Apple-provided encryption
        # (URLSession HTTPS, CryptoKit, Keychain). Declaring this here means
        # App Store Connect skips the export-compliance prompt on every
        # upload. Flip to true (and supply the right docs) only when the app
        # ships custom or non-standard cryptography.
        ITSAppUsesNonExemptEncryption: false
        # Networking — default API endpoint. The API is served over HTTPS at
        # api.linkfit.az (behind Cloudflare, valid cert). Xcode schemes/CI can
        # override at runtime with LINKFIT_API_BASE_URL without rebuilding.
        APIBaseURL: "https://api.linkfit.az"
        # Sentry DSN — substituted from the `SENTRY_DSN` build setting (see
        # `settings.base` above). Empty by default; an empty value makes
        # `CrashReporter.start(...)` a no-op so the app still boots in dev/CI
        # without a configured Sentry project. To wire crash reporting,
        # `export SENTRY_DSN=https://...@sentry.io/...` before invoking
        # `xcodebuild`, or set it in your CI secrets.
        SENTRY_DSN: "$(SENTRY_DSN)"
        # PostHog API key + host — substituted from the matching build
        # settings above. Empty key by default; an empty value makes
        # `Analytics.start(...)` a no-op so the app still boots in dev/CI
        # without a configured PostHog project. To wire product analytics,
        # `export POSTHOG_API_KEY=phc_...` (and optionally
        # `POSTHOG_HOST=https://eu.posthog.com` for the EU region) before
        # invoking `xcodebuild`, or set the values in CI secrets.
        POSTHOG_API_KEY: "$(POSTHOG_API_KEY)"
        POSTHOG_HOST: "$(POSTHOG_HOST)"
        # The API now lives on api.linkfit.az over HTTPS with a valid cert
        # (Cloudflare), so it needs NO ATS exception — it satisfies default
        # App Transport Security. We keep arbitrary loads off and only
        # whitelist localhost for local-backend development.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
          NSExceptionDomains:
            localhost:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: false
        # Google Sign-In: the iOS OAuth 2.0 client ID (provisioned in Google
        # Cloud Console for bundle az.linkfit.app) is read at runtime via the
        # `GIDClientID` key; GoogleSignInService feeds it to GIDConfiguration.
        # Its reversed form is registered as a URL scheme below so the system
        # browser can hand the OAuth callback back to the app.
        GIDClientID: 655337821050-pi74ppu4gjv7b0gs0v417djtndrl7nt2.apps.googleusercontent.com
        # Widget agent — deep-link scheme so widget taps land in the host
        # app. URLs look like `linkfit://g/<gameId>` or `linkfit://matchmaking`.
        CFBundleURLTypes:
          - CFBundleURLName: az.linkfit.app
            CFBundleURLSchemes:
              - linkfit
              - com.googleusercontent.apps.655337821050-pi74ppu4gjv7b0gs0v417djtndrl7nt2
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Linkfit
        excludes:
          # Audio/Haptic agent — keep the one-time WAV synth script out of
          # the app bundle (still available in-repo for regen).
          - "Resources/Sounds/_generate.py"
    resources: []
    settings:
      base:
        # OAuth agent: we ship an explicit Info.plist (declared via `info:`
        # above) so we can express CFBundleURLTypes — a structured key not
        # expressible via INFOPLIST_KEY_*. Auto-generation is disabled here.
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: Linkfit/Linkfit.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: az.linkfit.app
        TARGETED_DEVICE_FAMILY: "1,2"
        DEVELOPMENT_TEAM: "93QUDM26D5"
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  # Widget agent — WidgetKit extension that surfaces the next game, current
  # streak, and a "find a match" deep link on Home + Lock screens. Reads from
  # the App Group UserDefaults suite written by the main app; never makes
  # network calls itself.
  LinkfitWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "18.0"
    entitlements:
      path: LinkfitWidgets/LinkfitWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.az.linkfit.app
    info:
      path: LinkfitWidgets/Info.plist
      properties:
        CFBundleDisplayName: Linkfit
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    sources:
      - path: LinkfitWidgets
        excludes:
          - "Info.plist"
          - "LinkfitWidgets.entitlements"
      # Shared model + cache compiled into both the app and the widget so
      # the Codable contract can't drift. Single source of truth in the app.
      - path: Linkfit/Core/Widgets/SharedDefaults.swift
    settings:
      base:
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: LinkfitWidgets/LinkfitWidgets.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: az.linkfit.app.widgets
        TARGETED_DEVICE_FAMILY: "1,2"
        DEVELOPMENT_TEAM: "93QUDM26D5"
        CODE_SIGN_STYLE: Automatic
        SKIP_INSTALL: YES

  # LiveActivity agent — dedicated ActivityKit widget extension that
  # renders the in-progress match banner on the lock screen and inside
  # the Dynamic Island. Kept as its own target (rather than folded into
  # `LinkfitWidgets`) so the LiveActivity and Widget agents can own
  # disjoint files without an @main collision in a single bundle.
  LinkfitLiveActivity:
    type: app-extension
    platform: iOS
    deploymentTarget: "18.0"
    entitlements:
      path: LinkfitLiveActivity/LinkfitLiveActivity.entitlements
    info:
      path: LinkfitLiveActivity/Info.plist
      properties:
        CFBundleDisplayName: Linkfit Match
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSSupportsLiveActivities: true
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    sources:
      - path: LinkfitLiveActivity
        excludes:
          - "Info.plist"
          - "LinkfitLiveActivity.entitlements"
      # Shared ActivityAttributes type — compiled into BOTH the app
      # target (for the coordinator) and this widget extension (for
      # rendering). Same Swift module would be ideal, but extensions
      # don't link the app binary, so we double-compile the file.
      - path: Linkfit/Core/LiveActivity/MatchActivityAttributes.swift
    settings:
      base:
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: LinkfitLiveActivity/LinkfitLiveActivity.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: az.linkfit.app.liveactivity
        TARGETED_DEVICE_FAMILY: "1,2"
        DEVELOPMENT_TEAM: "93QUDM26D5"
        CODE_SIGN_STYLE: Automatic
        SKIP_INSTALL: YES

  LinkfitTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: LinkfitTests
    dependencies:
      - target: Linkfit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: az.linkfit.app.tests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Linkfit.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Linkfit"

schemes:
  Linkfit:
    build:
      targets:
        Linkfit: all
        LinkfitWidgets: all
        LinkfitLiveActivity: all
        LinkfitTests: [test]
    test:
      targets:
        - LinkfitTests
      gatherCoverageData: true
    run:
      config: Debug
    archive:
      config: Release
