# In-container nginx fronting php-fpm for the Laravel API. Listens on 8000 —
# the upstream the edge nginx (infra/nginx.conf) and docker-compose proxy to.
# Replaces the single-threaded `php artisan serve` dev server.

user  nginx;
worker_processes  auto;
error_log  /dev/stderr  warn;
pid        /run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    access_log    /dev/stdout;
    sendfile      on;
    keepalive_timeout  65;

    # Must be >= the PHP upload_max_filesize so the edge isn't the only thing
    # gating large uploads, and the larger 50MB videos MediaController allows go
    # through. Matches the uploads.ini limit set in the Dockerfile.
    client_max_body_size  64m;

    server {
        listen       8000;
        server_name  _;
        root         /app/public;
        index        index.php;

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            include        fastcgi_params;
            fastcgi_pass   127.0.0.1:9000;
            fastcgi_index  index.php;
            fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_read_timeout 65s;
        }

        location ~ /\.(?!well-known).* {
            deny all;
        }
    }
}
