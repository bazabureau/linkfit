name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel in-flight runs from the same ref/PR so we don't burn CI minutes on
# superseded commits.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: api · typecheck · lint · test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    # A real Postgres service container — vitest's testcontainers-based
    # globalSetup will still spin its own ephemeral pg, but we expose a
    # service here too as a fallback / for ad-hoc CLI checks (migrations,
    # smoke scripts) without paying the docker pull cost twice.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: linkfit
          POSTGRES_PASSWORD: linkfit
          POSTGRES_DB: linkfit
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U linkfit"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      # vitest expands these on demand — the test container spins its own DB
      # via testcontainers, but having a sane DATABASE_URL lets local
      # node-pg-migrate sanity checks work too.
      DATABASE_URL: postgres://linkfit:linkfit@localhost:5432/linkfit
      CI: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/api/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --run

      - name: Build
        run: npm run build

      - name: Upload coverage / junit artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results
          path: |
            apps/api/coverage/
          if-no-files-found: ignore

  ios:
    name: ios · build · test
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/ios

    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode versions
        run: |
          ls /Applications | grep Xcode || true
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: List available simulators
        run: xcrun simctl list devices available || true

      # iPhone 17 Pro per project brief. If the runner image doesn't yet have
      # that device, fall back to a generic latest-OS iPhone so CI still runs.
      - name: Build & test
        run: |
          set -o pipefail
          DEST="platform=iOS Simulator,name=iPhone 17 Pro"
          if ! xcrun simctl list devices available | grep -q "iPhone 17 Pro"; then
            echo "iPhone 17 Pro not available on this runner — falling back to generic latest iPhone"
            DEST="platform=iOS Simulator,name=iPhone 16 Pro,OS=latest"
          fi
          xcodebuild \
            -project Linkfit.xcodeproj \
            -scheme Linkfit \
            -destination "$DEST" \
            -resultBundlePath build/TestResults.xcresult \
            clean test | xcpretty || xcodebuild \
              -project Linkfit.xcodeproj \
              -scheme Linkfit \
              -destination "$DEST" \
              -resultBundlePath build/TestResults.xcresult \
              clean test

      - name: Upload xcresult
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results
          path: apps/ios/build/TestResults.xcresult
          if-no-files-found: ignore

  admin:
    name: admin · typecheck · build
    runs-on: ubuntu-latest
    # Only run the admin job when the admin workspace actually exists. We
    # guard with a path check inside the job so the workflow stays a single
    # file. If apps/admin disappears later the job simply no-ops.
    defaults:
      run:
        working-directory: apps/admin

    steps:
      - uses: actions/checkout@v4

      - name: Check apps/admin exists
        id: check
        run: |
          if [ -f apps/admin/package.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        working-directory: .

      - uses: actions/setup-node@v4
        if: steps.check.outputs.exists == 'true'
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/admin/package-lock.json

      - name: Install
        if: steps.check.outputs.exists == 'true'
        run: npm ci

      - name: Typecheck
        if: steps.check.outputs.exists == 'true'
        run: npm run typecheck

      - name: Build
        if: steps.check.outputs.exists == 'true'
        env:
          # Next.js wants a public URL for build-time crawling; in CI we
          # don't have a real one so we point at a local placeholder.
          NEXT_PUBLIC_API_URL: http://localhost:4000
        run: npm run build
