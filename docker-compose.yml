services:
  postgres:
    image: postgres:16-alpine
    container_name: linkfit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: linkfit
      POSTGRES_PASSWORD: linkfit_dev_password
      POSTGRES_DB: linkfit
    ports:
      - "55432:5432"
    volumes:
      - ./.postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linkfit -d linkfit"]
      interval: 5s
      timeout: 3s
      retries: 10
