# LOCAL DEVELOPMENT ONLY. This file ships a known weak password and bind-mounts
# the DB data dir into the repo tree — it must never be run on a shared/staging
# host. Use docker-compose.prod.yml for any non-local deployment.
services:
  postgres:
    image: postgres:16-alpine
    container_name: linkfit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: linkfit
      POSTGRES_PASSWORD: linkfit_dev_password
      POSTGRES_DB: linkfit
    ports:
      # Bind to loopback only so the dev DB (known credential) is reachable from
      # local tooling but NOT from the host's external network interfaces.
      - "127.0.0.1:55432:5432"
    volumes:
      - ./.postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linkfit -d linkfit"]
      interval: 5s
      timeout: 3s
      retries: 10
