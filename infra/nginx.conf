events {}

http {
  upstream linkfit_api {
    server api:8000;
  }

  map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
  }

  # General per-IP edge limit (reads + most writes). A tighter zone for
  # auth/brute-forceable endpoints is defined below.
  limit_req_zone $binary_remote_addr zone=api_per_ip:10m rate=10r/s;
  limit_req_zone $binary_remote_addr zone=auth_per_ip:10m rate=2r/s;
  # Return 429 (what the Flutter client expects) instead of the default 503
  # when the edge rate limit trips.
  limit_req_status 429;

  # gzip JSON / text responses to cut bandwidth + latency for the mobile app.
  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_vary on;
  gzip_types application/json application/javascript text/plain text/css text/xml application/xml;

  server {
    listen 80;
    server_name _;

    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    # Modern cipher allow-list (TLS 1.3 suites are negotiated automatically).
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    # Session reuse so we don't do a full handshake on every connection.
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    # OCSP stapling is best-effort: nginx serves normally if stapling can't be
    # fetched, and needs a resolver to look up the OCSP responder. No ssl_dhparam
    # is set on purpose — no dhparam file is mounted and referencing a missing
    # file would break startup; the ECDHE suites above do not require it.
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # Edge security headers as defense-in-depth so they hold even if the upstream
    # app omits them (e.g. HSTS, which the app only emits when it trusts the
    # proxy and sees X-Forwarded-Proto: https). `always` so they apply to 4xx/5xx
    # error envelopes too.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    # Must be >= the PHP/app upload limits (MediaController allows 50MB video,
    # 25MB audio) and the in-container nginx + PHP ini (64M), or large uploads
    # get rejected with a 413 at the edge.
    client_max_body_size 64m;

    # Resolve the real client IP from the trusted internal/CDN proxy so the
    # /metrics allow-list (and logs) gate on the actual client, not the proxy IP.
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    location = /metrics {
      allow 127.0.0.1;
      allow 10.0.0.0/8;
      allow 172.16.0.0/12;
      allow 192.168.0.0/16;
      deny all;

      proxy_pass http://linkfit_api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }

    # Tighter edge limit for brute-forceable auth endpoints.
    location ~ ^/api/v1/auth/ {
      limit_req zone=auth_per_ip burst=10 nodelay;

      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_read_timeout 65s;
      proxy_send_timeout 65s;
      proxy_pass http://linkfit_api;
    }

    location / {
      limit_req zone=api_per_ip burst=60 nodelay;

      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 65s;
      proxy_send_timeout 65s;
      proxy_pass http://linkfit_api;
    }
  }
}
